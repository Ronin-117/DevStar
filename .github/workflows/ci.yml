name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Rust
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Cargo audit
        run: |
          cargo install cargo-audit
          cargo audit
        working-directory: src-tauri
        continue-on-error: true

      # Node
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Frontend build
        run: npm run build

  build-windows:
    needs: lint-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: --target x86_64-pc-windows-msvc

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: devstar-windows-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: devstar-windows-exe
          path: src-tauri/target/x86_64-pc-windows-msvc/release/DevStar.exe

  build-linux:
    needs: lint-and-test
    if: always() && needs.lint-and-test.result == 'success'
    continue-on-error: true
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: --target x86_64-unknown-linux-gnu

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: devstar-linux-deb
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb

  release:
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          name: devstar-windows-msi
          path: artifacts/msi

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: devstar-windows-exe
          path: artifacts/exe

      - name: Download Linux DEB
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: devstar-linux-deb
          path: artifacts/deb

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/msi/*.msi
            artifacts/exe/*.exe
            artifacts/deb/*.deb
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
